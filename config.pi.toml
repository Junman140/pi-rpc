ENDPOINT = "0.0.0.0:8000"
ADMIN_ENDPOINT = "0.0.0.0:8001"

# Captive core lives in the same container and exposes HTTP locally.
PI_NODE_URL = "http://localhost:11626"
PI_NODE_BINARY_PATH = "/usr/bin/pi-node"

# Pi testnet settings.
NETWORK_PASSPHRASE = "Pi Testnet"
HISTORY_ARCHIVE_URLS = ["http://history.testnet.minepi.com"]

# Captive core config mounted into container.
CAPTIVE_CORE_CONFIG_PATH = "/app/pi-core.cfg"
CAPTIVE_CORE_STORAGE_PATH = "/captive-core"

# Store the RPC SQLite DB on a dedicated data mount (see pi-dapp-suite/docker-compose.yml).
DB_PATH = "/data/pi-rpc.sqlite"
LOG_LEVEL = "info"
LOG_FORMAT = "text"
