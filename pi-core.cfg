# Captive core config for Pi testnet archive catchup.
# This file is mounted into the pi-rpc container at /app/pi-core.cfg.

HTTP_PORT=11626
PUBLIC_HTTP_PORT=false
DATABASE="sqlite3://stellar.db"

NETWORK_PASSPHRASE="Pi Testnet"

# Pi Testnet overlay peers (required so captive-core can receive SCP messages).
# Without these, the node often sits at 0 peers and never progresses.
# Captive-core TOML (strict mode) does NOT support KNOWN_PEERS. Use preferred peers instead.
PREFERRED_PEERS=[
  "testnet1.minepi.com:31402",
  "testnet2.minepi.com:31402",
  "testnet3.minepi.com:31402"
]
PREFERRED_PEERS_ONLY=false

# Pi Testnet uses a non-default peer port.
PEER_PORT=31402

UNSAFE_QUORUM=true
FAILURE_SAFETY=0

# Minimal quorum for non-validating captive usage.
[QUORUM_SET]
THRESHOLD_PERCENT=51
VALIDATORS=[
  "GC6R2IQ7LAEWFFNV2ZMXPMOLGGCFRFX6NQFCNT2PLB3KVJPHTIYV4ZPR",
  "GDRIZZC5PNZ6XBJTBZX52WX4NQ2K4Y5XBKVBRYNFDDS4VO6POQ3IGZCL",
  "GAKI7FNXWIJHKV4CKFSU6KDNFTPYAUOP2WIKL5IFSOPEUSYK4Y3LWMXX"
]

# Pi testnet history archive.
[HISTORY.pi_testnet]
get="curl -sf http://history.testnet.minepi.com/{0} -o {1}"
put="echo skip"
mkdir="echo skip"
