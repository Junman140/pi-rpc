services:
  pi-rpc:
    image: pi-rpc:local
    command: ["--config-path", "/app/config.pi.toml"]
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ../config.pi.toml:/app/config.pi.toml:ro
      - ../pi-core.cfg:/app/pi-core.cfg:ro
      # Persist RPC DB + captive-core state to avoid full re-catchup on restarts.
      - pi_rpc_db:/data
      - pi_captive_core:/captive-core
    healthcheck:
      # Ready when getHealth no longer reports "DB is empty".
      test:
        [
          "CMD-SHELL",
          "curl -fsS -X POST http://localhost:8000/ -H 'content-type: application/json' --data '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\",\"params\":{}}' | grep -vq 'DB is empty'",
        ]
      # Initial ingestion/catchup can take a long time on first boot.
      interval: 20s
      timeout: 10s
      retries: 360
      start_period: 120s

  faucet:
    build:
      context: .
      dockerfile: apps/faucet/Dockerfile
    env_file:
      - ./.env
    ports:
      - "4000:4000"
    volumes:
      # Persist deployed contract IDs outside the container so you can set them from host scripts.
      - ./.contracts-state.json:/app/.contracts-state.json
      - ./.contracts.env:/app/.contracts.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      pi-rpc:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # Web app never receives FAUCET_SECRET; it only calls the faucet API.
      VITE_FAUCET_URL: "http://localhost:4000"
      # Browser calls pi-rpc via the published host port.
      VITE_PI_RPC_URL: "http://localhost:8000"
      VITE_NETWORK_PASSPHRASE: "Pi Testnet"
    ports:
      - "5173:5173"
    depends_on:
      - faucet

volumes:
  pi_rpc_db: {}
  pi_captive_core: {}

