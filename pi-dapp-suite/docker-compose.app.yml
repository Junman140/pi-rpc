services:
  faucet:
    build:
      context: .
      dockerfile: apps/faucet/Dockerfile
    env_file:
      - ./.env
    environment:
      # When running RPC standalone (outside this compose project),
      # reach it via the host-published port.
      PI_RPC_URL: "http://host.docker.internal:8000"
    ports:
      - "4000:4000"
    volumes:
      - ./.contracts-state.json:/app/.contracts-state.json
      - ./.contracts.env:/app/.contracts.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_FAUCET_URL: "http://localhost:4000"
      VITE_PI_RPC_URL: "http://localhost:8000"
      VITE_NETWORK_PASSPHRASE: "Pi Testnet"
    ports:
      - "5173:5173"
    depends_on:
      - faucet
